#
# `cargo audit` (and the `rustsec/audit-check` GitHub Action used by
# the reusable `Rust CI / Audit` job) read this file for advisory
# ignores. Mirrors the `[advisories].ignore` block in `deny.toml`,
# but applies to the standalone `cargo audit` tool which doesn't
# consume `deny.toml`.

[advisories]
# Bench-only competitor crates — never ship in any release artefact.
# Pulled in via `[dev-dependencies]` in `crates/noyalib/Cargo.toml`
# exclusively so `crates/noyalib/benches/comparison.rs` can produce
# honest 5-way head-to-head numbers.
ignore = [
    # serde_yml — `serde_yml::ser::Serializer.emitter` can segfault.
    # Bench-only via the maintainer's prior crate; kept for
    # comparison coverage. The advisory is real for production
    # users of serde_yml.
    "RUSTSEC-2025-0068",
    # libyml — `libyml::string::yaml_string_extend` is unsound;
    # transitive via serde_yml. Same bench-only justification.
    "RUSTSEC-2025-0067",
]
