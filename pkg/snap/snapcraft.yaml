#
# Snap package for noyalib.
#
# Status: scaffolding for v0.0.x; first publish to the Snap Store
# tracks v0.1.x. Once `snapcraft register noyalib` succeeds and a
# snap-store maintainer account exists, the `snap-publish` job in
# release-binaries.yml will run `snapcraft upload` per release.

name: noyalib
base: core22
adopt-info: noyalib
summary: Pure-Rust YAML 1.2 parser, formatter, and validator
description: |
  noyalib provides the noyafmt and noyavalidate command-line tools
  backed by a pure-Rust YAML 1.2 implementation with full serde
  integration and zero `unsafe` code.

  noyafmt rewrites YAML files through a lossless CST formatter
  that preserves comments, anchor positions, and document
  structure byte-for-byte while normalising whitespace and
  quoting.

  noyavalidate checks YAML syntax and (optionally) enforces a
  JSON Schema 2020-12 contract.

grade: stable
confinement: classic    # touches user-supplied YAML files anywhere on the FS

license: MIT OR Apache-2.0

source-code: https://github.com/sebastienrousseau/noyalib
issues:      https://github.com/sebastienrousseau/noyalib/issues
contact:     sebastian.rousseau@gmail.com

apps:
  noyafmt:
    command: bin/noyafmt
    completer: complete/noyafmt.bash
  noyavalidate:
    command: bin/noyavalidate
    completer: complete/noyavalidate.bash

parts:
  noyalib:
    plugin: rust
    source: .
    rust-channel: '1.75'
    rust-features:
      - noyalib-cli/noyavalidate
    rust-path:
      - crates/noya-cli
    build-environment:
      - NOYA_GEN_ASSETS: '1'
      - RUSTFLAGS: '--remap-path-prefix=$CRAFT_PART_BUILD=. --remap-path-prefix=$HOME=~'
    organize:
      target/release/noyafmt:      bin/noyafmt
      target/release/noyavalidate: bin/noyavalidate
      doc/noyafmt.1:               share/man/man1/noyafmt.1
      doc/noyavalidate.1:          share/man/man1/noyavalidate.1
      complete/noyafmt.bash:       complete/noyafmt.bash
      complete/noyavalidate.bash:  complete/noyavalidate.bash
    parse-info:
      - usr/share/metainfo/noyalib.appdata.xml
