name: OpenSSF Scorecard

# Scores the repository against the public OpenSSF Scorecard rubric
# (signed releases, branch protection, dependency pinning, SAST,
# fuzzing, SLSA provenance, etc.). Results land in Rekor and the
# repo's public security tab; the badge in the README points at the
# live score.

on:
  branch_protection_rule:
  schedule:
    - cron: '0 4 * * 1'  # Weekly, Monday 04:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to Code Scanning
      id-token: write          # publish results to Rekor
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@05b42c624433fc40578a4040d5cf5e36ddca8cde # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 7

      - uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3
        with:
          sarif_file: results.sarif
