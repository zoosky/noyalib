name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip publish)'
        type: boolean
        default: true

# Least-privilege default: top-level workflow only reads. The
# jobs that need write scope (release-artifact attestation,
# github-release upload) get it locally — see per-job
# `permissions:` blocks below.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'

jobs:
  # ── Quality gate ────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
          components: rustfmt, clippy

      # CACHE-POISONING GUARD: release-time quality gate uses an
      # isolated CARGO_TARGET_DIR so a stale artefact set from a
      # PR-time build (with different lints, warnings, or feature
      # config) can never mask a release regression. Release must
      # verify from a clean-fingerprint state.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ". -> target-release-validate"
          key: release-validate

      - name: Quality checks
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target-release-validate
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-features
          cargo doc --no-deps --all-features

      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          # Workspace root Cargo.toml has no top-level version field;
          # the per-crate versions live under crates/*/Cargo.toml.
          # Read the canonical version from `noyalib` (every other
          # publishable crate is kept in lockstep via release-prep
          # `cargo workspaces version` runs).
          CARGO_VERSION=$(grep '^version' crates/noyalib/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match crates/noyalib/Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          # Cross-check that every publishable satellite is on the
          # same version (catches a partial workspaces-bump that
          # forgot to update one crate).
          for crate in noya-cli noyalib-mcp noyalib-lsp noyalib-wasm; do
            v=$(grep '^version' "crates/$crate/Cargo.toml" | head -1 | sed 's/.*"\(.*\)".*/\1/')
            if [ "$v" != "$CARGO_VERSION" ]; then
              echo "::error::crates/$crate/Cargo.toml version ($v) is out of sync with crates/noyalib ($CARGO_VERSION)"
              exit 1
            fi
          done
          echo "Version verified across noyalib + 4 satellites: $TAG_VERSION"

  # ── Build checksums & SBOM ──────────────────────────────────────────
  artifacts:
    name: Build artifacts
    needs: validate
    runs-on: ubuntu-latest
    # `id-token: write` — Fulcio keyless signing exchanges this OIDC
    #   token for an ephemeral certificate that signs each `.crate`.
    # `attestations: write` — SLSA L3 build-provenance attestation
    #   is uploaded into the workflow's attestation store.
    # `contents: read` — checkout / source access only.
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Package crate
        run: cargo package --all-features --allow-dirty

      - name: Generate SBOM
        run: |
          cargo tree --edges normal --prefix depth --format '{p} {l}' > SBOM.txt

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd target/package
          # `cargo package --workspace` produces one `.crate` per
          # publishable crate (noyalib, noya-cli, noyalib-mcp,
          # noyalib-lsp, noyalib-wasm, plus xtask which is private).
          # The original implementation captured `$(ls *.crate)`
          # as a single string and passed it to sha*sum — which
          # treats embedded newlines as part of the filename and
          # fails. Iterate explicitly so each crate gets its own
          # checksum line in SHA256SUMS.txt / SHA512SUMS.txt.
          : > SHA256SUMS.txt
          : > SHA512SUMS.txt
          for f in *.crate; do
            sha256sum "$f" >> SHA256SUMS.txt
            sha512sum "$f" >> SHA512SUMS.txt
          done
          # Surface the list of crate files for downstream cosign /
          # upload steps that want to reference each one explicitly.
          ls *.crate > CRATE_FILES.txt
          echo "CRATE_COUNT=$(wc -l < CRATE_FILES.txt)" >> "$GITHUB_ENV"

      # ── SLSA L3 build provenance ───────────────────────────────────
      # Records the build's exact source commit, builder identity, and
      # invocation parameters into the public Rekor transparency log.
      # Anyone can later verify the artefact came from this exact CI
      # workflow on this repo via `gh attestation verify`.
      - name: Attest build provenance (SLSA L3)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            target/package/*.crate
            SBOM.txt

      # ── Keyless sigstore signing ──────────────────────────────────
      # `cosign sign-blob` with no `--key` triggers Fulcio keyless
      # signing: the workflow's OIDC token is exchanged for an
      # ephemeral certificate bound to this repo + ref + workflow,
      # the artefact is signed, and signature + cert land in Rekor.
      # Verifiers run `cosign verify-blob` with the issuer / identity
      # constraints documented in SECURITY.md.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign release artefacts (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          # cosign v4 deprecated `--output-signature` and
          # `--output-certificate` — the flags are silently
          # ignored and only `.bundle` is written. The bundle is
          # a self-contained sigstore protobuf carrying both the
          # signature and the Fulcio certificate, so verifiers
          # use `cosign verify-blob --bundle <path>.bundle <file>`
          # (see SECURITY.md). Scorecard's Signed-Releases check
          # detects the bundle as a provenance asset.
          cd target/package
          for f in *.crate; do
            cosign sign-blob --bundle "${f}.bundle" "$f"
          done
          cd -
          cosign sign-blob --bundle "SBOM.txt.bundle" SBOM.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: |
            target/package/*.crate
            target/package/*.bundle
            target/package/SHA256SUMS.txt
            target/package/SHA512SUMS.txt
            SBOM.txt
            SBOM.txt.bundle
          retention-days: 5

  # ── Cross-platform verification ─────────────────────────────────────
  cross-verify:
    name: Verify (${{ matrix.os }})
    # CACHE-POISONING GUARD: per-OS + per-release-tag CARGO_TARGET_DIR
    # so this cross-platform verification always runs from a
    # release-tag-scoped fingerprint, never sharing state with the
    # validate job or with any other cross-verify OS.
    needs: validate
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target-release-verify-${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ". -> target-release-verify-${{ matrix.os }}"
          key: release-verify-${{ matrix.os }}
      - run: cargo test --all-features

  # ── GitHub Release ──────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [artifacts, cross-verify]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # `contents: write` — required to create the GitHub Release.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: artifacts

      - name: Generate release notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "$TAG" | head -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="${TAG}"
          fi
          echo "## What's Changed" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Checksums" >> RELEASE_NOTES.md
          echo '```' >> RELEASE_NOTES.md
          cat artifacts/target/package/SHA256SUMS.txt >> RELEASE_NOTES.md
          echo '```' >> RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "noyalib $GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md \
            artifacts/target/package/*.crate \
            artifacts/target/package/*.bundle \
            artifacts/target/package/SHA256SUMS.txt \
            artifacts/target/package/SHA512SUMS.txt \
            artifacts/SBOM.txt \
            artifacts/SBOM.txt.bundle

  # ── Publish to crates.io ────────────────────────────────────────────
  crates-io:
    name: Publish to crates.io
    needs: [github-release]
    if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # Publish each crate explicitly. The workspace root has no
        # package, so a bare `cargo publish` would fail. Order:
        #   1. `noyalib` — the library (no intra-workspace deps).
        #   2. Wait for crates.io's index to settle (~30s for new
        #      crate; 60s for first-publish since the API needs to
        #      provision the namespace).
        #   3. Satellite crates that depend on `noyalib`. Publish
        #      them in any order — they don't depend on each other.
        # `xtask` is `publish = false`; cargo refuses anyway.
        # `noyalib-wasm` is `publish = false` (npm-distributed);
        # cargo refuses.
        run: |
          set -euxo pipefail
          cargo publish -p noyalib --all-features
          # Crates.io's sparse index can take a moment to surface
          # a new crate version; sleep briefly so the satellite
          # publish doesn't fail with "could not find `noyalib`".
          sleep 60
          cargo publish -p noya-cli --all-features
          cargo publish -p noyalib-mcp --all-features
          cargo publish -p noyalib-lsp --all-features
