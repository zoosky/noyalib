name: Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip publish)'
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'

jobs:
  # ── Quality gate ────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Quality checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-features
          cargo doc --no-deps --all-features

      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          # Workspace root Cargo.toml has no top-level version field;
          # the per-crate versions live under crates/*/Cargo.toml.
          # Read the canonical version from `noyalib` (every other
          # publishable crate is kept in lockstep via release-prep
          # `cargo workspaces version` runs).
          CARGO_VERSION=$(grep '^version' crates/noyalib/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match crates/noyalib/Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          # Cross-check that every publishable satellite is on the
          # same version (catches a partial workspaces-bump that
          # forgot to update one crate).
          for crate in noya-cli noyalib-mcp noyalib-lsp noyalib-wasm; do
            v=$(grep '^version' "crates/$crate/Cargo.toml" | head -1 | sed 's/.*"\(.*\)".*/\1/')
            if [ "$v" != "$CARGO_VERSION" ]; then
              echo "::error::crates/$crate/Cargo.toml version ($v) is out of sync with crates/noyalib ($CARGO_VERSION)"
              exit 1
            fi
          done
          echo "Version verified across noyalib + 4 satellites: $TAG_VERSION"

  # ── Build checksums & SBOM ──────────────────────────────────────────
  artifacts:
    name: Build artifacts
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Package crate
        run: cargo package --all-features --allow-dirty

      - name: Generate SBOM
        run: |
          cargo tree --edges normal --prefix depth --format '{p} {l}' > SBOM.txt

      - name: Generate checksums
        run: |
          cd target/package
          CRATE_FILE=$(ls *.crate)
          sha256sum "$CRATE_FILE" > SHA256SUMS.txt
          sha512sum "$CRATE_FILE" > SHA512SUMS.txt
          echo "CRATE_FILE=$CRATE_FILE" >> "$GITHUB_ENV"

      # ── SLSA L3 build provenance ───────────────────────────────────
      # Records the build's exact source commit, builder identity, and
      # invocation parameters into the public Rekor transparency log.
      # Anyone can later verify the artefact came from this exact CI
      # workflow on this repo via `gh attestation verify`.
      - name: Attest build provenance (SLSA L3)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            target/package/*.crate
            SBOM.txt

      # ── Keyless sigstore signing ──────────────────────────────────
      # `cosign sign-blob` with no `--key` triggers Fulcio keyless
      # signing: the workflow's OIDC token is exchanged for an
      # ephemeral certificate bound to this repo + ref + workflow,
      # the artefact is signed, and signature + cert land in Rekor.
      # Verifiers run `cosign verify-blob` with the issuer / identity
      # constraints documented in SECURITY.md.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign release artefacts (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cd target/package
          for f in *.crate; do
            cosign sign-blob \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done
          cd -
          cosign sign-blob \
            --output-signature "SBOM.txt.sig" \
            --output-certificate "SBOM.txt.pem" \
            SBOM.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-artifacts
          path: |
            target/package/*.crate
            target/package/*.sig
            target/package/*.pem
            target/package/SHA256SUMS.txt
            target/package/SHA512SUMS.txt
            SBOM.txt
            SBOM.txt.sig
            SBOM.txt.pem
          retention-days: 5

  # ── Cross-platform verification ─────────────────────────────────────
  cross-verify:
    name: Verify (${{ matrix.os }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --all-features

  # ── GitHub Release ──────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [artifacts, cross-verify]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-artifacts
          path: artifacts

      - name: Generate release notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "$TAG" | head -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="${TAG}"
          fi
          echo "## What's Changed" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Checksums" >> RELEASE_NOTES.md
          echo '```' >> RELEASE_NOTES.md
          cat artifacts/target/package/SHA256SUMS.txt >> RELEASE_NOTES.md
          echo '```' >> RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "noyalib $GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md \
            artifacts/target/package/*.crate \
            artifacts/target/package/*.sig \
            artifacts/target/package/*.pem \
            artifacts/target/package/SHA256SUMS.txt \
            artifacts/target/package/SHA512SUMS.txt \
            artifacts/SBOM.txt \
            artifacts/SBOM.txt.sig \
            artifacts/SBOM.txt.pem

  # ── Publish to crates.io ────────────────────────────────────────────
  crates-io:
    name: Publish to crates.io
    needs: [github-release]
    if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --all-features
