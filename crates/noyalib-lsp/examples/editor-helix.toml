#
# noyalib-lsp configuration for Helix.
#
# Append this snippet to `~/.config/helix/languages.toml` (Linux /
# macOS) or `%AppData%\helix\languages.toml` (Windows). Helix
# auto-discovers the file on next launch; no plugin install
# needed.
#
# Helix doesn't use a custom registry — every language server
# binary just needs a `[language-server.<name>]` section and a
# matching reference under `[[language]].language-servers`.

[language-server.noyalib-lsp]
command = "noyalib-lsp"
args = []
# Optional: bump the request timeout if you load multi-MB YAML
# (default Helix setting is generally fine; this is just here as
# documentation of the knob).
# timeout = 20

[[language]]
name = "yaml"
language-servers = ["noyalib-lsp"]
auto-format = true            # Format-on-save via the LSP.
formatter = { command = "noyafmt", args = ["--stdin"] }   # Optional: also bind to the standalone formatter for `:format`.
indent = { tab-width = 2, unit = "  " }   # YAML convention.

# Verifying the install:
#
#   $ which noyalib-lsp
#   $ hx test.yaml         # open a file; diagnostics appear inline
#   $ :format              # invoke the formatter explicitly
#   $ K                    # hover-at-cursor (LSP textDocument/hover)
