name: CodSpeed perf dashboard

# Runs the criterion benchmarks under CodSpeed's instrumented
# harness and uploads the results to the project's CodSpeed
# dashboard. The dashboard surfaces:
#   - regression alerts on PRs (% diff vs the base branch)
#   - long-term trend graphs per benchmark
#   - the live numbers that the README links to (replacing the
#     static benchmark table that goes stale within weeks of any
#     toolchain bump).
#
# Gating: the upload step needs a `CODSPEED_TOKEN` secret. Until
# that secret is set, the workflow exits cleanly so the gate does
# not block other CI feedback.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmarks:
    name: Run criterion benches under CodSpeed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Skip if CODSPEED_TOKEN is not configured
        id: gate
        run: |
          if [ -z "${{ secrets.CODSPEED_TOKEN }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CODSPEED_TOKEN not configured — skipping perf upload."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: CodSpeedHQ/action@c381be0bfd20e844fb45594f6aa182ffcd94545c # v4.15.0
        if: steps.gate.outputs.configured == 'true'
        with:
          run: cargo bench --bench benchmarks
          token: ${{ secrets.CODSPEED_TOKEN }}
