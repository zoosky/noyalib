name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main, "feat/**"]
  schedule:
    - cron: '0 4 * * *'  # Nightly at 04:00 UTC — triggers Miri
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Rust CI
    uses: sebastienrousseau/pipelines/.github/workflows/rust-ci.yml@47ed7767be5273aef0bbc60c6f6c16aba5fb6f59 # v0.0.2
    with:
      rust-version: 'stable'
      run-clippy: true
      run-fmt: true
      run-audit: true
      # Coverage runs in the dedicated `coverage-gate` job below,
      # which uses `cargo +nightly llvm-cov` so the
      # `feature(coverage_attribute)` annotations work. The
      # reusable workflow's coverage step uses stable rustc and
      # fails on those annotations, so we keep it disabled here
      # to avoid duplicate work and red runs.
      run-coverage: false
    secrets: inherit

  test-matrix:
    # Dogfooded from shared-test-matrix.yml. Matrix (os × toolchain)
    # comes from the shared workflow's defaults. Satellites can
    # trim OSes / toolchains they don't support by passing custom
    # JSON to the `os-list` / `toolchain-list` inputs.
    # NOTE: MSRV-1.85 lives in msrv-core (below) — the optional
    # features pull in ergonomics deps that themselves require
    # newer rustc (miette → backtrace ≥ 1.82, garde → 1.84,
    # ICU chain → 1.86), so `cargo test --all-features` cannot
    # run on 1.85. The MSRV gate covers the *core* feature set.
    uses: ./.github/workflows/shared-test-matrix.yml

  miri-focused:
    # Dogfooded from shared-miri-focused.yml. noyalib is
    # `#![forbid(unsafe_code)]` so Miri does not police noyalib's
    # own code — it verifies the *interaction* with the unsafe
    # runtime deps (indexmap, rustc-hash, ryu, itoa, memchr,
    # smallvec) plus, via MIRI_TARGET, that the SWAR decimal
    # parser and structural-bitmask iterator work on big-endian
    # platforms. The shared workflow expects `scripts/miri.sh` to
    # exist in the caller's checkout.
    uses: ./.github/workflows/shared-miri-focused.yml

  miri-full:
    # Dogfooded from shared-miri-full.yml. Weekly full sweep +
    # big-endian mips64 target, gated behind schedule /
    # workflow_dispatch.
    uses: ./.github/workflows/shared-miri-full.yml

  cargo-deny:
    # Consumes the shared cargo-deny workflow from this same repo
    # so noyalib dogfoods the shared pattern before any satellite
    # takes it via `uses: sebastienrousseau/noyalib/.github/workflows/shared-cargo-deny.yml@<sha>`.
    uses: ./.github/workflows/shared-cargo-deny.yml

  fuzz-diff:
    # Dogfooded from shared-fuzz-diff.yml. Runs the caller's
    # `fuzz_diff` fuzz target for 10 seconds per push.
    uses: ./.github/workflows/shared-fuzz-diff.yml

  cargo-semver-checks:
    name: cargo-semver-checks
    # On every PR, compare the public API of the proposed change
    # against the latest release tag and fail if any breaking
    # change is detected without a major-version bump. The crate
    # is at `0.0.x` so technically every minor change can break,
    # but running this gate now establishes the muscle for the
    # 1.x stability promise.
    #
    # Pre-publication guard: cargo-semver-checks needs a baseline
    # to compare against. Until `noyalib` ships its first crates.io
    # release the gate has nothing to compare and would always fail
    # with "noyalib not found in registry". The job is wired in
    # ready for v0.0.1's first publish; the published-package
    # probe below short-circuits to success in the meantime.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - id: published
        name: Probe crates.io for an existing release
        run: |
          if curl -sfL "https://crates.io/api/v1/crates/noyalib" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "noyalib not yet on crates.io — skipping semver-checks until first publish."
          fi
      - uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2.9
        if: steps.published.outputs.exists == 'true'
        with:
          package: noyalib

  cargo-vet:
    # Dogfooded from shared-cargo-vet.yml — see the shared file
    # for full context. Satellites will consume it via
    # `uses: sebastienrousseau/noyalib/.github/workflows/shared-cargo-vet.yml@<sha>`.
    uses: ./.github/workflows/shared-cargo-vet.yml

  cargo-machete:
    # Dogfooded from shared-cargo-machete.yml — see the shared
    # file for full context. Satellites will consume it via
    # `uses: sebastienrousseau/noyalib/.github/workflows/shared-cargo-machete.yml@<sha>`.
    uses: ./.github/workflows/shared-cargo-machete.yml

  reuse-lint:
    # Dogfooded from shared-reuse.yml — see the shared file for
    # full context. Satellites will consume it via
    # `uses: sebastienrousseau/noyalib/.github/workflows/shared-reuse.yml@<sha>`.
    uses: ./.github/workflows/shared-reuse.yml

  msrv-1-85-core:
    # Dogfooded from shared-msrv-core.yml. Runs three sub-checks
    # (no_std, default, clippy) at the MSRV toolchain — each in
    # its own isolated CARGO_TARGET_DIR so a stale-but-passing
    # cache from one config cannot mask a regression in another.
    # noyalib's MSRV is 1.85 for the core feature set: default
    # features (`std`) plus the always-on parser / serializer /
    # Value / CST. Optional features pull in ergonomics deps that
    # themselves require newer rustc (miette → backtrace ≥ 1.82,
    # garde → 1.84, figment / validate-schema → various ICU 1.86
    # dragnet); those are covered by the stable test matrix.
    uses: ./.github/workflows/shared-msrv-core.yml
    with:
      toolchain: "1.85.0"

  coverage-gate:
    # Dogfooded from shared-coverage.yml. noyalib's thresholds
    # (96% fn / 94% line / 93% region) exceed the 95% gold-standard
    # promise; the ignore-regex excludes the subprocess-driving
    # MCP/LSP tests and internal xtask tooling. (`noyalib-wasm`
    # coverage was excluded via the same regex until v0.0.12,
    # when the crate was split to its own repo per ADR-0005.)
    # Satellites can override any input to match their own coverage
    # baseline.
    uses: ./.github/workflows/shared-coverage.yml
    with:
      ignore-filename-regex: 'crates/noyalib-(mcp|lsp)/tests/protocol|crates/xtask/src/main\.rs'
      fail-under-functions: 96
      fail-under-lines: 94
      fail-under-regions: 93

  vendor-build:
    # Dogfooded from shared-vendor-offline.yml. Verifies the
    # workspace vendors + builds fully air-gapped — critical for
    # RHEL / FIPS-bound consumers.
    uses: ./.github/workflows/shared-vendor-offline.yml

  msrv-per-crate:
    # Dogfooded from shared-per-crate-msrv.yml. Walks every crate
    # in the workspace and runs `cargo +<msrv> check` against its
    # declared floor. Requires `scripts/msrv-per-crate.sh` in the
    # caller's checkout.
    uses: ./.github/workflows/shared-per-crate-msrv.yml

  no-std:
    # Dogfooded from shared-no-std.yml — the CARGO_TARGET_DIR
    # isolation + Swatinem cache-namespace split (preventing the
    # v0.0.9/v0.0.10 cache-poisoning class of bug) live in the
    # shared workflow. Satellites will consume it via
    # `uses: sebastienrousseau/noyalib/.github/workflows/shared-no-std.yml@<sha>`.
    uses: ./.github/workflows/shared-no-std.yml

  readme-examples:
    # Dogfooded from shared-readme-examples.yml. The check itself
    # (scripts/check-readme-examples.sh) is invoked by the shared
    # workflow and must exist in the caller's checkout at the same
    # path.
    uses: ./.github/workflows/shared-readme-examples.yml

  docs-strict:
    # Dogfooded from shared-rustdoc-strict.yml. The strict
    # RUSTDOCFLAGS + isolated CARGO_TARGET_DIR live in the shared
    # workflow.
    uses: ./.github/workflows/shared-rustdoc-strict.yml

  verify-signatures:
    # Dogfooded from shared-verify-signatures.yml. The gate itself
    # only runs on pull_request events (controlled inside the
    # shared workflow's `if:`).
    uses: ./.github/workflows/shared-verify-signatures.yml

  # ── Feature-matrix guard: `lossless-u64` ────────────────────────
  # `lossless-u64` is an opt-in Cargo feature that adds a public
  # enum variant (`Number::Unsigned`). Ships with its own compile
  # + test legs using an isolated `CARGO_TARGET_DIR` so a stale
  # artefact set from the default-feature build cannot serve as a
  # passing fingerprint for the feature-on build. Same
  # cache-poisoning guard rule as `no-std` (v0.0.11 CI-integrity
  # cut). See doc/adr/0004-lossless-u64-integers.md.
  #
  # Runs 2 legs (a 3rd `minimal + lossless-u64` leg was considered
  # but drops `strict-deserialise` which several tests already
  # require; that intersection is covered by `no-std` for the
  # compile side).
  #
  #   1. defaults + lossless-u64 — typical opt-in user
  #   2. all-features — feature × every other feature (including
  #      `compat-serde-yaml`), catches interference
  #
  # Each leg exercises: `cargo check`, `cargo test --tests`,
  # `cargo test --doc`. The dedicated `examples/lossless_u64.rs`
  # runs on the defaults leg.
  lossless-u64-matrix:
    name: lossless-u64 (${{ matrix.leg }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - leg: defaults
            flags: "--features lossless-u64"
          - leg: all-features
            flags: "--all-features"
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target-lossless-u64-${{ matrix.leg }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ". -> target-lossless-u64-${{ matrix.leg }}"
          key: lossless-u64-${{ matrix.leg }}
      - name: cargo check (${{ matrix.leg }})
        run: cargo check -p noyalib ${{ matrix.flags }} --locked
      - name: cargo test --tests (${{ matrix.leg }})
        run: cargo test -p noyalib ${{ matrix.flags }} --tests --locked
      - name: cargo test --doc (${{ matrix.leg }})
        run: cargo test -p noyalib ${{ matrix.flags }} --doc --locked
      - name: Run the lossless_u64 example
        if: matrix.leg == 'defaults'
        run: cargo run -p noyalib --example lossless_u64 --features lossless-u64 --locked
