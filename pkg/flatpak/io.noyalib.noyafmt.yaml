#
# Flatpak manifest for noyalib (Flathub target id: io.noyalib.noyafmt).
#
# Status: scaffolding for v0.0.x; first publish to Flathub tracks
# v0.1.x. Submission flow: PR against `flathub/io.noyalib.noyafmt`
# carrying this manifest plus the generated cargo-sources.json.

app-id: io.noyalib.noyafmt
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: noyafmt

finish-args:
  # noyafmt operates on user-supplied YAML files; minimum
  # filesystem access plus terminal use only.
  - --filesystem=host
  - --share=ipc
  - --socket=fallback-x11
  - --device=dri

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  build-args:
    - --share=network
  env:
    NOYA_GEN_ASSETS: '1'
    CARGO_HOME: /run/build/noyalib/cargo
    RUSTFLAGS: '--remap-path-prefix=/run/build=/build'

modules:
  - name: noyalib
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/sebastienrousseau/noyalib.git
        tag: v__VERSION__
        commit: __COMMIT__
      # Generated by `flatpak-cargo-generator.py Cargo.lock` on
      # every release bump. The script vendors the entire Cargo
      # dependency tree as offline-installable sources so Flathub's
      # network-isolated builders can produce reproducible bytes.
      - cargo-sources.json
    build-commands:
      - cargo --offline build --release --locked
            --manifest-path crates/noya-cli/Cargo.toml
            --bin noyafmt --bin noyavalidate
      - install -Dm755 target/release/noyafmt      /app/bin/noyafmt
      - install -Dm755 target/release/noyavalidate /app/bin/noyavalidate
      - install -Dm644 doc/noyafmt.1               /app/share/man/man1/noyafmt.1
      - install -Dm644 doc/noyavalidate.1          /app/share/man/man1/noyavalidate.1
      - install -Dm644 README.md                   /app/share/doc/noyalib/README.md
      - install -Dm644 LICENSE-MIT                 /app/share/licenses/noyalib/LICENSE-MIT
      - install -Dm644 LICENSE-APACHE              /app/share/licenses/noyalib/LICENSE-APACHE
