[dependencies]
serde = { version = "1.0", features = ["derive"] }
indexmap = { version = "2.14", features = ["serde"] }
rustc-hash = "2.1"
thiserror = "2.0"
itoa = "1"
ryu = "1"
memchr = "2.7"
smallvec = { version = "1.13", default-features = false }
miette = { version = "7", optional = true }
garde = { version = "0.22", optional = true, default-features = false, features = ["derive"] }
validator = { version = "0.19", optional = true, features = ["derive"] }
# `serde_yaml` 0.9 itself — only pulled when `compat-serde-yaml` is on.
# The upstream crate is unmaintained; we bring it in solely so the
# compat shim can offer `From` / `TryFrom` conversions between the two
# `Value` types and matching `Mapping` / `Number` shapes during
# migration. Drop this dep once the migration window closes.
serde_yaml = { version = "0.9", optional = true }
# JSON Schema codegen — derive `JsonSchema` for a Rust type and emit
# the schema as YAML for sharing / contract enforcement. Pulled in
# only when the `schema` feature is on so users who don't need
# codegen don't pay for the dep.
schemars = { version = "1.2", optional = true, default-features = false, features = ["derive", "std"] }
serde_json = { version = "1.0", optional = true }
# JSON Schema *validation* engine — pulled in only when the
# `validate-schema` feature is on. Default features are disabled so
# we don't drag in `reqwest` for HTTP `$ref` resolution; users who
# need that can re-enable it via their own dep.
jsonschema = { version = "0.33", optional = true, default-features = false }

[dev-dependencies]
serde_json = "1.0"
serde_bytes = "0.11"
criterion = "0.5"
proptest = "1.11"
serde_yaml_ng = "0.10"
yaml-rust2 = "0.9"
serde-saphyr = "0.0.24"
yaml_lib = "0.2"
rust-yaml = "0.0.5"

[[bench]]
name = "benchmarks"
harness = false

[[bench]]
