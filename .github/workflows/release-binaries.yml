# Multi-platform binary release pipeline (Phase 4 of PLAN.md).
#
# Status: Phase 4.1.a — `workflow_dispatch` only with `dry_run`
# defaulting to true. After a clean dry-run end-to-end against an
# existing tag, the trigger expands to include `push.tags`. Until
# then this workflow can be exercised manually without affecting
# the existing crates.io-only `release.yml`.
#
# Pipeline shape (mirrors ripgrep's release.yml + the satellite
# packaging channels added in PLAN.md):
#
#   create-release ─┬─► build-release  ─► lipo-universal ─┐
#                   │   (matrix × 14)                       │
#                   ├──► .deb  (gnu legs)                   ├─► github-release
#                   ├──► .rpm  (gnu legs)                   │       │
#                   ├──► .msi  (win legs)                   │       │
#                   └──► verify-reproducible ───────────────┘       │
#                                                                   ▼
#         ┌─────┬─────┬───────────┬──────────────┬────────────┐
#         ▼     ▼     ▼           ▼              ▼            ▼
#     homebrew aur  scoop  vscode-extension  npm-publish-mcp  container-publish
#
# `npm-publish` for @noyalib/noyalib-wasm was moved to the split
# repo sebastienrousseau/noyalib-wasm in v0.0.12 (ADR-0005).
#
# Every artefact is signed with cosign keyless and carries a SLSA
# L3 build provenance attestation. Per-channel jobs are gated on
# `inputs.dry_run` so a dry-run produces every artefact without
# pushing to any external registry.
#
# Required repo secrets (no-ops on dry-run):
#   HOMEBREW_TAP_TOKEN   → mislav/bump-homebrew-formula-action
#   AUR_SSH_PRIVATE_KEY  → KSXGitHub/github-actions-deploy-aur
#   SCOOP_BUCKET_TOKEN   → ScoopInstaller/GithubActions
#   VSCODE_MARKETPLACE_PAT  → vsce publish
#   OPEN_VSX_PAT         → ovsx publish
#   GITHUB_TOKEN         → provided automatically (release upload, GHCR push)
#
# npm publish uses Trusted Publishing (OIDC) — no long-lived
# `NPM_TOKEN` is needed. The publish jobs declare `id-token: write`
# and npm validates the workflow identity against per-package
# trusted-publisher policies configured at
# `https://www.npmjs.com/package/<name>/access`. The `npm publish
# --provenance` flag attaches a verified-publisher badge linking
# back to the GitHub Actions run that produced the artefact.

name: Release binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to package (e.g. v0.0.1). Must already exist on origin.'
        required: true
        type: string
      dry_run:
        description: 'Build artefacts only; skip every publish + bump step.'
        type: boolean
        default: true

# Least-privilege default: top-level workflow only reads.
# The jobs that need write scope (release creation, GHCR push,
# npm OIDC, attestation upload) declare it locally — see the
# per-job `permissions:` blocks below.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'

jobs:
  # ── Tag-gated release skeleton ──────────────────────────────────────
  create-release:
    name: Create GitHub Release skeleton
    runs-on: ubuntu-latest
    permissions:
      contents: write  # creates the GitHub Release object
    outputs:
      version: ${{ steps.parse.outputs.version }}
      source_date_epoch: ${{ steps.parse.outputs.source_date_epoch }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Parse version + commit timestamp
        id: parse
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          VER="${TAG#v}"
          SDE=$(git log -1 --format=%ct "$TAG")
          echo "version=${VER}"             >> "$GITHUB_OUTPUT"
          echo "source_date_epoch=${SDE}"   >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VER}"
          echo "SOURCE_DATE_EPOCH: ${SDE}"

      - name: Verify tag matches every workspace Cargo.toml
        run: |
          set -euo pipefail
          VER="${{ steps.parse.outputs.version }}"
          fail=0
          for manifest in crates/noyalib/Cargo.toml crates/noya-cli/Cargo.toml; do
            CARGO_VER=$(grep -E '^version *=' "$manifest" | head -1 | sed 's/.*"\(.*\)".*/\1/')
            if [ "$VER" != "$CARGO_VER" ]; then
              echo "::error file=${manifest}::Tag version (${VER}) does not match version (${CARGO_VER})"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || exit 1

  # ── Per-target binary build ─────────────────────────────────────────
  build-release:
    name: Build (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write       # uploads .tar.* / .zip assets to the release
      id-token: write       # Fulcio keyless signing of release artefacts
      attestations: write   # SLSA L3 build-provenance attestation
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux glibc
          - { target: x86_64-unknown-linux-gnu,         runner: ubuntu-latest,    cross: false, deb: true,  rpm: true,  archive: tar.gz }
          - { target: aarch64-unknown-linux-gnu,        runner: ubuntu-24.04-arm, cross: false, deb: true,  rpm: true,  archive: tar.gz }
          - { target: armv7-unknown-linux-gnueabihf,    runner: ubuntu-latest,    cross: true,  deb: true,  rpm: false, archive: tar.gz }
          - { target: arm-unknown-linux-gnueabihf,      runner: ubuntu-latest,    cross: true,  deb: true,  rpm: false, archive: tar.gz }
          - { target: powerpc64le-unknown-linux-gnu,    runner: ubuntu-latest,    cross: true,  deb: true,  rpm: false, archive: tar.gz }
          - { target: s390x-unknown-linux-gnu,          runner: ubuntu-latest,    cross: true,  deb: true,  rpm: false, archive: tar.gz }
          - { target: riscv64gc-unknown-linux-gnu,      runner: ubuntu-latest,    cross: true,  deb: true,  rpm: false, archive: tar.gz }
          # Linux musl (statically linked)
          - { target: x86_64-unknown-linux-musl,        runner: ubuntu-latest,    cross: true,  deb: false, rpm: false, archive: tar.gz }
          - { target: aarch64-unknown-linux-musl,       runner: ubuntu-24.04-arm, cross: false, deb: false, rpm: false, archive: tar.gz }
          # macOS
          - { target: x86_64-apple-darwin,              runner: macos-15-intel,   cross: false, deb: false, rpm: false, archive: tar.gz }
          - { target: aarch64-apple-darwin,             runner: macos-14,         cross: false, deb: false, rpm: false, archive: tar.gz }
          # Windows
          - { target: x86_64-pc-windows-msvc,           runner: windows-latest,   cross: false, deb: false, rpm: false, archive: zip, ext: .exe, msi: true }
          - { target: i686-pc-windows-msvc,             runner: windows-latest,   cross: false, deb: false, rpm: false, archive: zip, ext: .exe, msi: false }
          - { target: aarch64-pc-windows-msvc,          runner: windows-latest,   cross: false, deb: false, rpm: false, archive: zip, ext: .exe, msi: false }

    env:
      VERSION:           ${{ needs.create-release.outputs.version }}
      SOURCE_DATE_EPOCH: ${{ needs.create-release.outputs.source_date_epoch }}
      ARCHIVE_BASE:      noyalib-${{ needs.create-release.outputs.version }}-${{ matrix.target }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          targets:   ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked --version 0.2.5

      # ── Reproducible-build flags ──────────────────────────────
      - name: Configure reproducible build env
        shell: bash
        run: |
          {
            echo "RUSTFLAGS=--remap-path-prefix=$HOME=~ --remap-path-prefix=${{ github.workspace }}=/build"
            echo "NOYA_GEN_ASSETS=1"
          } >> "$GITHUB_ENV"

      # ── Compile ───────────────────────────────────────────────
      # `shell: bash` is required so the bash-style `\` line
      # continuation works on Windows runners too (the default
      # PowerShell parses `\` + newline as "missing expression
      # after unary operator '--'"). Git Bash ships on every
      # GitHub-hosted Windows runner.
      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        shell: bash
        run: |
          cargo build --release --locked --target ${{ matrix.target }} \
              --manifest-path crates/noya-cli/Cargo.toml \
              --bin noyafmt --bin noyavalidate

      - name: Build (cross)
        if: matrix.cross
        shell: bash
        run: |
          cross build --release --locked --target ${{ matrix.target }} \
              --manifest-path crates/noya-cli/Cargo.toml \
              --bin noyafmt --bin noyavalidate

      # ── Debug-symbol split (Linux gnu only) ────────────────────
      - name: Install llvm-tools (for llvm-objcopy)
        if: matrix.deb && !matrix.cross
        run: rustup component add llvm-tools-preview

      - name: Strip + extract debug symbols
        if: matrix.deb && !matrix.cross
        shell: bash
        run: |
          set -euo pipefail
          # `llvm-tools-preview` ships `llvm-objcopy` under the
          # rustup toolchain dir, not on PATH. Resolve it via
          # `rustc --print sysroot`.
          SYSROOT=$(rustc --print sysroot)
          HOST_TUPLE=$(rustc --print host-tuple)
          OBJCOPY="$SYSROOT/lib/rustlib/$HOST_TUPLE/bin/llvm-objcopy"
          for bin in noyafmt noyavalidate; do
            BIN="target/${{ matrix.target }}/release/${bin}"
            "$OBJCOPY" --only-keep-debug "${BIN}" "${BIN}.debug"
            "$OBJCOPY" --strip-debug --strip-unneeded "${BIN}"
            "$OBJCOPY" --add-gnu-debuglink="${BIN}.debug" "${BIN}"
            file "${BIN}"
          done

      # ── Stage release tarball / zip ────────────────────────────
      - name: Stage archive
        shell: bash
        run: |
          set -euo pipefail
          STAGE="$(mktemp -d)/${ARCHIVE_BASE}"
          mkdir -p "$STAGE/doc" "$STAGE/complete"
          EXT='${{ matrix.ext }}'
          cp "target/${{ matrix.target }}/release/noyafmt${EXT}"      "$STAGE/"
          cp "target/${{ matrix.target }}/release/noyavalidate${EXT}" "$STAGE/"
          cp README.md CHANGELOG.md LICENSE-APACHE LICENSE-MIT        "$STAGE/"
          cp doc/noyafmt.1 doc/noyavalidate.1                         "$STAGE/doc/"
          cp -r complete/. "$STAGE/complete/"
          cd "$(dirname "$STAGE")"
          if [[ '${{ matrix.archive }}' == 'zip' ]]; then
            7z a "${ARCHIVE_BASE}.zip" "$(basename "$STAGE")"
            mv "${ARCHIVE_BASE}.zip" "${{ github.workspace }}/"
          else
            tar -czf "${ARCHIVE_BASE}.tar.gz" "$(basename "$STAGE")"
            mv "${ARCHIVE_BASE}.tar.gz" "${{ github.workspace }}/"
          fi

      # ── Stage debuginfo tarball (Linux gnu only) ──────────────
      - name: Stage debuginfo tarball
        if: matrix.deb && !matrix.cross
        shell: bash
        run: |
          set -euo pipefail
          STAGE="$(mktemp -d)/${ARCHIVE_BASE}-debuginfo"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/noyafmt.debug"      "$STAGE/"
          cp "target/${{ matrix.target }}/release/noyavalidate.debug" "$STAGE/"
          cp LICENSE-APACHE LICENSE-MIT                                "$STAGE/"
          cd "$(dirname "$STAGE")"
          tar -czf "${ARCHIVE_BASE}-debuginfo.tar.gz" "$(basename "$STAGE")"
          mv "${ARCHIVE_BASE}-debuginfo.tar.gz" "${{ github.workspace }}/"

      # ── .deb (Linux gnu legs only) ─────────────────────────────
      - name: Build .deb
        if: matrix.deb
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-deb --locked --version 2.4.0
          cargo deb --target ${{ matrix.target }} \
              --manifest-path crates/noya-cli/Cargo.toml \
              --no-build --no-strip \
              --output "${{ github.workspace }}/${ARCHIVE_BASE}.deb"

      # ── .rpm (x86_64-gnu, aarch64-gnu only) ────────────────────
      - name: Build .rpm
        if: matrix.rpm
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-generate-rpm --locked --version 0.16.0
          # Stage the (already stripped) binaries where the rpm asset
          # spec references them. A targeted build leaves them under
          # target/<target>/release/.
          mkdir -p target/release
          cp "target/${{ matrix.target }}/release/noyafmt" \
             "target/${{ matrix.target }}/release/noyavalidate" \
             target/release/
          # cargo-generate-rpm requires a [package.metadata.generate-rpm]
          # table. The released v0.0.8 tag predates it, so inject one at
          # build time if the checked-out manifest lacks it (idempotent
          # once the source carries its own). Use echo-group rather than
          # a heredoc — a quoted heredoc terminator cannot be reached
          # inside an indented YAML block scalar.
          if ! grep -q 'package.metadata.generate-rpm' crates/noya-cli/Cargo.toml; then
            {
              echo ""
              echo "[package.metadata.generate-rpm]"
              echo "assets = ["
              echo '  { source = "target/release/noyafmt", dest = "/usr/bin/noyafmt", mode = "0755" },'
              echo '  { source = "target/release/noyavalidate", dest = "/usr/bin/noyavalidate", mode = "0755" },'
              echo '  { source = "doc/noyafmt.1", dest = "/usr/share/man/man1/noyafmt.1", mode = "0644", doc = true },'
              echo '  { source = "doc/noyavalidate.1", dest = "/usr/share/man/man1/noyavalidate.1", mode = "0644", doc = true },'
              echo '  { source = "LICENSE-MIT", dest = "/usr/share/licenses/noya-cli/LICENSE-MIT", mode = "0644", doc = true },'
              echo '  { source = "LICENSE-APACHE", dest = "/usr/share/licenses/noya-cli/LICENSE-APACHE", mode = "0644", doc = true },'
              echo "]"
            } >> crates/noya-cli/Cargo.toml
          fi
          # `--package` is the package *directory* (cargo-generate-rpm
          # opens `<value>/Cargo.toml`), not a workspace member name.
          cargo generate-rpm --target ${{ matrix.target }} \
              --package crates/noya-cli \
              --output "${{ github.workspace }}/${ARCHIVE_BASE}.rpm"

      # ── .msi (Windows MSVC legs only) ──────────────────────────
      - name: Build .msi
        if: matrix.msi
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-wix --locked --version 0.3.9
          # Render the WiX source: substitute the version and strip the
          # <Icon>/ARPPRODUCTICON lines. The referenced
          # pkg/windows/wix/noyalib.ico is not in-tree (the .msi has
          # never built), so drop the cosmetic ARP icon rather than fail
          # `light` with LGHT0103. cargo-wix runs `light` from the repo
          # root, so all other Source paths resolve from there.
          mkdir -p target/wix
          sed -e "s/__VERSION__/${VERSION}/g" \
              -e '/<Icon /d' \
              -e '/ARPPRODUCTICON/d' \
              pkg/windows/wix/noyalib.wxs > target/wix/noyalib.wxs
          # The .wxs harvests target\release\*.exe, but a targeted
          # --no-build build leaves the binaries under
          # target/<target>/release/. Stage them at the root-relative
          # path the harvest expects (LICENSE-* already live at root).
          mkdir -p target/release
          cp "target/${{ matrix.target }}/release/noyafmt.exe" \
             "target/${{ matrix.target }}/release/noyavalidate.exe" \
             target/release/
          cargo wix --target ${{ matrix.target }} \
              --package noya-cli \
              --no-build \
              --nocapture \
              --include target/wix/noyalib.wxs \
              --output "${{ github.workspace }}/${ARCHIVE_BASE}.msi"

      # ── Checksums + sigstore ──────────────────────────────────
      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}"
          # macOS ships `shasum` but not `sha256sum`; the Windows Git
          # bash ships `sha256sum`/`sha512sum` (coreutils) but not
          # `shasum`. Pick whichever exists.
          checksum() {
            if command -v shasum >/dev/null 2>&1; then
              shasum -a "$1" "$2"
            else
              "sha${1}sum" "$2"
            fi
          }
          for f in ${ARCHIVE_BASE}.tar.gz ${ARCHIVE_BASE}.zip \
                   ${ARCHIVE_BASE}.deb ${ARCHIVE_BASE}.rpm \
                   ${ARCHIVE_BASE}.msi ${ARCHIVE_BASE}-debuginfo.tar.gz; do
            [[ -f "$f" ]] || continue
            checksum 256 "$f" > "${f}.sha256"
            checksum 512 "$f" > "${f}.sha512"
          done

      - name: Attest build provenance (SLSA L3)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            ${{ github.workspace }}/${{ env.ARCHIVE_BASE }}.tar.gz
            ${{ github.workspace }}/${{ env.ARCHIVE_BASE }}.zip
            ${{ github.workspace }}/${{ env.ARCHIVE_BASE }}.deb
            ${{ github.workspace }}/${{ env.ARCHIVE_BASE }}.rpm
            ${{ github.workspace }}/${{ env.ARCHIVE_BASE }}.msi
            ${{ github.workspace }}/${{ env.ARCHIVE_BASE }}-debuginfo.tar.gz

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign artefacts (keyless)
        env:
          COSIGN_YES: 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}"
          for f in ${ARCHIVE_BASE}.tar.gz ${ARCHIVE_BASE}.zip \
                   ${ARCHIVE_BASE}.deb ${ARCHIVE_BASE}.rpm \
                   ${ARCHIVE_BASE}.msi ${ARCHIVE_BASE}-debuginfo.tar.gz; do
            [[ -f "$f" ]] || continue
            # cosign v4 deprecated --output-signature/--output-certificate
            # (silently ignored, only the bundle is written). Write a
            # self-contained sigstore bundle; verify with
            # `cosign verify-blob --bundle <f>.bundle <f>`.
            cosign sign-blob --bundle "${f}.bundle" "$f"
          done

      # ── Upload paths ───────────────────────────────────────────
      - name: Upload to GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}"
          # nullglob: most targets have no .deb/.rpm/.msi, so without it
          # the unmatched patterns reach `gh` as literal filenames and
          # fail the whole upload. The old `2>/dev/null || true` then hid
          # that, so only the single-glob universal upload ever landed.
          shopt -s nullglob
          files=( ${ARCHIVE_BASE}.tar.gz* ${ARCHIVE_BASE}.zip* \
                  ${ARCHIVE_BASE}.deb* ${ARCHIVE_BASE}.rpm* \
                  ${ARCHIVE_BASE}.msi* ${ARCHIVE_BASE}-debuginfo.tar.gz* )
          for attempt in 1 2 3; do
            if gh release upload "${{ inputs.tag }}" "${files[@]}" --clobber; then
              break
            fi
            [ "$attempt" = 3 ] && { echo "::error::release upload failed after 3 attempts"; exit 1; }
            echo "upload attempt ${attempt} failed; retrying" && sleep $((attempt * 15))
          done

      - name: Upload artefact (always; dry-run consumes it)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARCHIVE_BASE }}
          path: |
            ${{ github.workspace }}/${{ env.ARCHIVE_BASE }}.*
          retention-days: 7

  # ── macOS Universal Binary (x86_64 + aarch64 → fat) ─────────────────
  lipo-universal:
    name: macOS Universal Binary
    needs: [create-release, build-release]
    runs-on: macos-14
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      VERSION:      ${{ needs.create-release.outputs.version }}
      ARCHIVE_BASE: noyalib-${{ needs.create-release.outputs.version }}-universal-apple-darwin
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path:           dl
          merge-multiple: false
          pattern:        noyalib-${{ env.VERSION }}-*-apple-darwin

      - name: Lipo + stage
        shell: bash
        run: |
          set -euo pipefail
          STAGE="$(mktemp -d)/${ARCHIVE_BASE}"
          mkdir -p "$STAGE/doc" "$STAGE/complete"
          # Each downloaded artefact directory contains the per-arch
          # tarball; extract both and lipo the resulting binaries.
          for arch in x86_64 aarch64; do
            tar -xzf "dl/noyalib-${VERSION}-${arch}-apple-darwin/noyalib-${VERSION}-${arch}-apple-darwin.tar.gz" \
                -C "dl/"
          done
          for bin in noyafmt noyavalidate; do
            lipo -create \
              "dl/noyalib-${VERSION}-x86_64-apple-darwin/${bin}" \
              "dl/noyalib-${VERSION}-aarch64-apple-darwin/${bin}" \
              -output "$STAGE/${bin}"
            lipo -info "$STAGE/${bin}"
          done
          cp README.md CHANGELOG.md LICENSE-APACHE LICENSE-MIT  "$STAGE/"
          cp doc/noyafmt.1 doc/noyavalidate.1                   "$STAGE/doc/"
          cp -r complete/. "$STAGE/complete/"
          cd "$(dirname "$STAGE")"
          tar -czf "${ARCHIVE_BASE}.tar.gz" "$(basename "$STAGE")"
          mv "${ARCHIVE_BASE}.tar.gz" "${{ github.workspace }}/"

      - name: Generate checksums
        shell: bash
        run: |
          cd "${{ github.workspace }}"
          shasum -a 256 "${ARCHIVE_BASE}.tar.gz" > "${ARCHIVE_BASE}.tar.gz.sha256"
          shasum -a 512 "${ARCHIVE_BASE}.tar.gz" > "${ARCHIVE_BASE}.tar.gz.sha512"

      - name: Attest provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ github.workspace }}/${{ env.ARCHIVE_BASE }}.tar.gz

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign
        env:
          COSIGN_YES: 'true'
        run: |
          cd "${{ github.workspace }}"
          # cosign v4: write a self-contained bundle (the legacy
          # --output-signature/--output-certificate flags are ignored).
          cosign sign-blob --bundle "${ARCHIVE_BASE}.tar.gz.bundle" \
            "${ARCHIVE_BASE}.tar.gz"

      - name: Upload to GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd "${{ github.workspace }}"
          gh release upload "${{ inputs.tag }}" \
            ${ARCHIVE_BASE}.tar.gz*  --clobber 2>/dev/null || true

      - name: Upload artefact (dry-run)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARCHIVE_BASE }}
          path: ${{ github.workspace }}/${{ env.ARCHIVE_BASE }}.*
          retention-days: 7

  # ── Reproducible-build verification ─────────────────────────────────
  verify-reproducible:
    name: Reproducible build
    needs: [create-release, build-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TARGET:            x86_64-unknown-linux-gnu
      VERSION:           ${{ needs.create-release.outputs.version }}
      SOURCE_DATE_EPOCH: ${{ needs.create-release.outputs.source_date_epoch }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain:  stable
          targets:    ${{ env.TARGET }}
          components: llvm-tools-preview

      # Configure RUSTFLAGS exactly as build-release does — via
      # $GITHUB_ENV in a bash run block so $HOME expands to the real
      # path. A step-level `env:` value leaves $HOME literal, which
      # remaps nothing and yields a different (non-matching) binary.
      - name: Configure reproducible build env
        shell: bash
        run: |
          {
            echo "RUSTFLAGS=--remap-path-prefix=$HOME=~ --remap-path-prefix=${{ github.workspace }}=/build"
            echo "NOYA_GEN_ASSETS=1"
          } >> "$GITHUB_ENV"

      - name: Rebuild on a clean runner
        shell: bash
        run: |
          cargo build --release --locked --target ${{ env.TARGET }} \
              --manifest-path crates/noya-cli/Cargo.toml \
              --bin noyafmt --bin noyavalidate

      - name: Strip to match the release archive
        shell: bash
        run: |
          set -euo pipefail
          # build-release strips the gnu binaries (debug-symbol split)
          # before archiving, so the reproducibility comparison must
          # strip identically or it compares stripped vs unstripped.
          SYSROOT=$(rustc --print sysroot)
          HOST_TUPLE=$(rustc --print host-tuple)
          OBJCOPY="$SYSROOT/lib/rustlib/$HOST_TUPLE/bin/llvm-objcopy"
          for bin in noyafmt noyavalidate; do
            BIN="target/${TARGET}/release/${bin}"
            "$OBJCOPY" --only-keep-debug "${BIN}" "${BIN}.debug"
            "$OBJCOPY" --strip-debug --strip-unneeded "${BIN}"
            "$OBJCOPY" --add-gnu-debuglink="${BIN}.debug" "${BIN}"
          done

      - name: Compute local SHA256
        id: local
        run: |
          set -euo pipefail
          for bin in noyafmt noyavalidate; do
            DIGEST=$(sha256sum "target/${TARGET}/release/${bin}" | cut -d' ' -f1)
            echo "${bin}=${DIGEST}" >> "$GITHUB_OUTPUT"
            echo "local ${bin}: ${DIGEST}"
          done

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: noyalib-${{ env.VERSION }}-${{ env.TARGET }}
          path: dl

      - name: Compare to published artefact
        shell: bash
        run: |
          set -euo pipefail
          cd dl
          tar -xzf "noyalib-${VERSION}-${TARGET}.tar.gz"
          for bin in noyafmt noyavalidate; do
            PUBLISHED=$(sha256sum "noyalib-${VERSION}-${TARGET}/${bin}" | cut -d' ' -f1)
            LOCAL='${{ steps.local.outputs.noyafmt }}'
            if [ "$bin" = "noyavalidate" ]; then LOCAL='${{ steps.local.outputs.noyavalidate }}'; fi
            echo "published ${bin}: ${PUBLISHED}"
            echo "local     ${bin}: ${LOCAL}"
            if [ "$PUBLISHED" != "$LOCAL" ]; then
              echo "::error::SHA256 mismatch for ${bin}"
              exit 1
            fi
          done

  # ── GitHub Release notes finalisation ───────────────────────────────
  github-release:
    name: GitHub Release
    needs: [create-release, build-release, lipo-universal, verify-reproducible]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write       # finalise GitHub Release notes
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          PREV=$(git tag --sort=-version:refname | grep -v "^${TAG}\$" | head -1 || true)
          RANGE="${PREV:+${PREV}..}${TAG}"
          {
            echo "## What's Changed"
            echo
            git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges
            echo
            echo
            echo "## Verification"
            echo
            echo "Every artefact is signed with cosign keyless and carries a SLSA L3 attestation."
            echo "See \`pkg/VERIFY.md\` for the verification cookbook."
          } > RELEASE_NOTES.md
          gh release edit "${TAG}" --notes-file RELEASE_NOTES.md

  # ── Homebrew tap PR ─────────────────────────────────────────────────
  homebrew-bump:
    name: Bump Homebrew tap
    needs: [create-release, github-release]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read  # external tap repo write via HOMEBREW_TAP_TOKEN
    steps:
      - name: Bump formula
        uses: mislav/bump-homebrew-formula-action@ccf2332299a883f6af50a1d2d41e5df7904dd769 # v3
        with:
          formula-name:    noyalib
          formula-path:    Formula/noyalib.rb
          homebrew-tap:    sebastienrousseau/homebrew-tap
          download-url:    https://github.com/sebastienrousseau/noyalib/archive/refs/tags/${{ inputs.tag }}.tar.gz
          commit-message: |
            noyalib ${{ inputs.tag }}

            Created via release-binaries.yml workflow.
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  # ── AUR PKGBUILD update ─────────────────────────────────────────────
  aur-bump:
    name: Bump AUR
    needs: [create-release, github-release]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read  # external AUR push via AUR_SSH_PRIVATE_KEY
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}

      - name: Compute SHA256s
        id: sha
        run: |
          set -euo pipefail
          VER="${{ needs.create-release.outputs.version }}"
          for arch in x86_64 aarch64; do
            URL="https://github.com/sebastienrousseau/noyalib/releases/download/${{ inputs.tag }}/noyalib-${VER}-${arch}-unknown-linux-gnu.tar.gz"
            DIGEST=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)
            echo "${arch}=${DIGEST}" >> "$GITHUB_OUTPUT"
          done

      - name: Render PKGBUILD
        run: |
          sed -e "s/__VERSION__/${{ needs.create-release.outputs.version }}/g" \
              -e "s/__SHA256_X86_64__/${{ steps.sha.outputs.x86_64 }}/g" \
              -e "s/__SHA256_AARCH64__/${{ steps.sha.outputs.aarch64 }}/g" \
              pkg/arch/PKGBUILD.template > /tmp/PKGBUILD

      - name: Push to AUR
        uses: KSXGitHub/github-actions-deploy-aur@da03e160361ce01bf087e790b6ffd196d7dccff7 # v3
        with:
          pkgname:        noyalib-bin
          pkgbuild:       /tmp/PKGBUILD
          commit_username: github-actions[bot]
          commit_email:    github-actions[bot]@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: 'Update to v${{ needs.create-release.outputs.version }}'

  # ── Scoop bucket update ─────────────────────────────────────────────
  scoop-bump:
    name: Bump Scoop bucket
    needs: [create-release, github-release]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read  # external bucket push via SCOOP_BUCKET_TOKEN
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}

      - name: Render manifest
        id: render
        run: |
          set -euo pipefail
          VER="${{ needs.create-release.outputs.version }}"
          BASE="https://github.com/sebastienrousseau/noyalib/releases/download/${{ inputs.tag }}"
          SHA_X64=$(curl -fsSL "${BASE}/noyalib-${VER}-x86_64-pc-windows-msvc.zip" | sha256sum | cut -d' ' -f1)
          SHA_ARM=$(curl -fsSL "${BASE}/noyalib-${VER}-aarch64-pc-windows-msvc.zip" | sha256sum | cut -d' ' -f1)
          sed -e "s/__VERSION__/${VER}/g" \
              -e "s/__SHA256_X64__/${SHA_X64}/g" \
              -e "s/__SHA256_ARM64__/${SHA_ARM}/g" \
              pkg/windows/scoop/noyalib.json > /tmp/noyalib.json

      - name: Push to Scoop bucket
        uses: ScoopInstaller/GithubActions@37a17b993c5ae4ae44fdc47379eb67010c800323 # v2.0.0
        with:
          token:    ${{ secrets.SCOOP_BUCKET_TOKEN }}
          bucket:   sebastienrousseau/scoop-bucket
          manifest: /tmp/noyalib.json

  # ── VS Code Marketplace + Open VSX ──────────────────────────────────
  vscode-extension:
    name: Publish VS Code extension
    needs: [create-release, build-release, github-release]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # uploads .vsix to the GitHub Release
    env:
      VERSION: ${{ needs.create-release.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache:        'npm'
          cache-dependency-path: pkg/vscode/package.json

      # Pull the bundled noyalib-lsp binaries from this run's
      # build-release artefacts so the extension carries them.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path:    dl
          pattern: noyalib-${{ env.VERSION }}-*-apple-darwin

      - name: Build + package .vsix
        working-directory: pkg/vscode
        run: |
          set -euo pipefail
          # `npm ci` over `npm install` pins all dep versions to the
          # committed `package-lock.json`. Scorecard's Pinned-
          # Dependencies check counts `npm ci` as pinned and `npm
          # install` as unpinned.
          npm ci
          mkdir -p bin
          # The ext bundle includes only the host's noyalib-lsp; the
          # `noyalib.path` setting lets users point at a system one.
          cp ../../target/release/noyalib-lsp bin/ 2>/dev/null || true
          npx --yes @vscode/vsce package --out "../../noyalib-${{ env.VERSION }}.vsix"

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCODE_MARKETPLACE_PAT }}
        working-directory: pkg/vscode
        run: |
          npx --yes @vscode/vsce publish --packagePath "../../noyalib-${{ env.VERSION }}.vsix"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_PAT }}
        working-directory: pkg/vscode
        run: |
          npx --yes ovsx publish "../../noyalib-${{ env.VERSION }}.vsix"

      - name: Upload .vsix to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.tag }}" \
              "noyalib-${{ env.VERSION }}.vsix" --clobber 2>/dev/null || true

  # `noyalib-wasm` npm publish moved to
  # sebastienrousseau/noyalib-wasm as of v0.0.12 (ADR-0005 pilot).
  # See that repo's `.github/workflows/release-binaries.yml`.

  # ── npm publish — MCP wrapper ───────────────────────────────────────
  npm-publish-mcp:
    name: Publish noyalib-mcp wrapper to npm
    needs: [create-release, github-release]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync version from tag
        run: |
          cd pkg/npm-mcp-wrapper
          npm version "${{ needs.create-release.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Publish (Trusted Publishing + provenance)
        run: |
          cd pkg/npm-mcp-wrapper
          npm publish --provenance --access public

  # ── Container images (multi-arch via buildx) ────────────────────────
  container-publish:
    name: Container ${{ matrix.image.name }}
    needs: [create-release, github-release]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write      # push image manifest to ghcr.io
      id-token: write      # cosign keyless signing of the image
      attestations: write  # SLSA L3 image provenance
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: noyafmt,      dockerfile: pkg/docker/Dockerfile     }
          - { name: noyalib,      dockerfile: pkg/docker/Dockerfile.full }
          - { name: noyalib-mcp,  dockerfile: pkg/docker/Dockerfile.mcp }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (multi-arch)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context:    .
          file:       ${{ matrix.image.dockerfile }}
          platforms:  linux/amd64,linux/arm64
          push:       true
          provenance: mode=max
          sbom:       true
          build-args: |
            SOURCE_DATE_EPOCH=${{ needs.create-release.outputs.source_date_epoch }}
          tags: |
            ghcr.io/sebastienrousseau/${{ matrix.image.name }}:${{ needs.create-release.outputs.version }}
            ghcr.io/sebastienrousseau/${{ matrix.image.name }}:latest
