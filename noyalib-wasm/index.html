<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>noyalib WASM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'SF Mono', 'Fira Code', monospace; background: #0a0a0a; color: #e0e0e0; padding: 2rem; }
    h1 { font-size: 1.2rem; color: #fff; margin-bottom: 1.5rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; display: block; }
    textarea { width: 100%; height: 200px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #333; border-radius: 6px; padding: 0.75rem; font-family: inherit; font-size: 0.85rem; resize: vertical; }
    textarea:focus { outline: none; border-color: #4ade80; }
    .actions { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    button { background: #1a1a1a; color: #4ade80; border: 1px solid #333; border-radius: 4px; padding: 0.4rem 0.8rem; font-family: inherit; font-size: 0.8rem; cursor: pointer; }
    button:hover { background: #222; border-color: #4ade80; }
    #status { font-size: 0.8rem; margin-top: 0.5rem; }
    .ok { color: #4ade80; }
    .err { color: #f87171; }
    .log { background: #111; border-radius: 6px; padding: 0.75rem; font-size: 0.8rem; color: #888; max-height: 150px; overflow-y: auto; margin-top: 0.5rem; }
    .log .entry { margin-bottom: 0.25rem; }
    .log .check { color: #4ade80; }
    .log .cross { color: #f87171; }
  </style>
</head>
<body>
  <h1>noyalib -- wasm</h1>

  <div class="grid">
    <div>
      <label>YAML Input</label>
      <textarea id="input">name: noyalib
version: 1
features:
  - serde
  - safe
  - fast
server:
  host: localhost
  port: 8080
  debug: true</textarea>
    </div>
    <div>
      <label>Output</label>
      <textarea id="output" readonly></textarea>
    </div>
  </div>

  <div class="actions">
    <button onclick="doParse()">parse</button>
    <button onclick="doStringify()">stringify</button>
    <button onclick="doGetPath()">get_path("server.host")</button>
    <button onclick="doValidate()">validate</button>
    <button onclick="doMerge()">merge</button>
    <button onclick="doBench()">bench (1000x)</button>
  </div>

  <div id="status"></div>
  <div id="log" class="log"></div>

  <script type="module">
    import init, { parse, stringify, get_path, validate_json, merge } from './pkg/noyalib_wasm.js';

    await init();
    log('check', 'WASM module loaded');

    window.doParse = () => {
      try {
        const yaml = document.getElementById('input').value;
        const obj = parse(yaml);
        document.getElementById('output').value = JSON.stringify(obj, null, 2);
        status('ok', 'Parsed YAML to JS object');
      } catch (e) { status('err', e.message); }
    };

    window.doStringify = () => {
      try {
        const yaml = document.getElementById('input').value;
        const obj = parse(yaml);
        const result = stringify(obj);
        document.getElementById('output').value = result;
        status('ok', 'Stringified JS object to YAML');
      } catch (e) { status('err', e.message); }
    };

    window.doGetPath = () => {
      try {
        const yaml = document.getElementById('input').value;
        const val = get_path(yaml, 'server.host');
        document.getElementById('output').value = JSON.stringify(val, null, 2);
        status('ok', `get_path("server.host") = ${JSON.stringify(val)}`);
      } catch (e) { status('err', e.message); }
    };

    window.doValidate = () => {
      try {
        const yaml = document.getElementById('input').value;
        validate_json(yaml);
        status('ok', 'JSON schema: valid');
      } catch (e) { status('err', `JSON schema: ${e.message}`); }
    };

    window.doMerge = () => {
      try {
        const base = document.getElementById('input').value;
        const override_yaml = 'server:\n  host: production.example.com\n  ssl: true\n';
        const result = merge(base, override_yaml);
        document.getElementById('output').value = result;
        status('ok', 'Merged with override');
      } catch (e) { status('err', e.message); }
    };

    window.doBench = () => {
      const yaml = document.getElementById('input').value;
      const start = performance.now();
      for (let i = 0; i < 1000; i++) { parse(yaml); }
      const elapsed = (performance.now() - start).toFixed(1);
      const per_op = (parseFloat(elapsed) / 1000 * 1000).toFixed(1);
      document.getElementById('output').value = `1000 iterations in ${elapsed}ms\n${per_op}us/op`;
      status('ok', `1000 parse ops in ${elapsed}ms (${per_op}us/op)`);
    };

    function status(type, msg) {
      const el = document.getElementById('status');
      el.className = type;
      el.textContent = msg;
      log(type === 'ok' ? 'check' : 'cross', msg);
    }

    function log(icon, msg) {
      const el = document.getElementById('log');
      const sym = icon === 'check' ? '\u2713' : '\u2717';
      const cls = icon === 'check' ? 'check' : 'cross';
      el.innerHTML += `<div class="entry"><span class="${cls}">${sym}</span> ${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }
  </script>
</body>
</html>
